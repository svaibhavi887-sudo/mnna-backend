<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin – M&A Conquest</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #05112A; --navy2: #0A1F4A; --accent: #F5C842;
  --green: #4CAF7A; --red: #E84040; --muted: #8899BB; --white: #F0F4FF;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; padding: 20px; }
h1 { color: var(--accent); font-size: 22px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
p.sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

.grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
.card { background: var(--navy2); border: 1px solid rgba(245,200,66,0.2); border-radius: 12px; padding: 20px; }
.card h3 { font-size: 12px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: var(--white); font-size: 14px; outline: none; }
.form-group input:focus { border-color: var(--accent); }

.btn { display: block; width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-bottom: 8px; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn-green { background: var(--green); color: #fff; }
.btn-yellow { background: var(--accent); color: var(--navy); }
.btn-red { background: var(--red); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

.status-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
.status-row .team-name { flex: 1; font-weight: 600; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.badge.solved { background: rgba(76,175,122,0.2); color: var(--green); }
.badge.failed { background: rgba(232,64,64,0.2); color: #FF9999; }
.badge.playing { background: rgba(255,255,255,0.06); color: var(--muted); }
.badge.waiting { background: rgba(245,200,66,0.12); color: var(--accent); }

.phase-badge { display: inline-block; background: rgba(245,200,66,0.15); border: 1px solid var(--accent); border-radius: 6px; padding: 4px 14px; font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 14px; }

.log { max-height: 200px; overflow-y: auto; font-size: 12px; }
.log-item { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--muted); }
.log-item span { color: var(--accent); }
.log-item.ok { color: var(--green); }
.log-item.err { color: #FF9999; }

.stat { text-align: center; }
.stat .num { font-size: 28px; font-weight: 800; color: var(--accent); }
.stat .lbl { font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
.stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
.stats-row .card { flex: 1; padding: 14px; }

#adminStatus { font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; display: none; }
#adminStatus.ok { background: rgba(76,175,122,0.15); color: var(--green); border: 1px solid rgba(76,175,122,0.3); }
#adminStatus.err { background: rgba(232,64,64,0.15); color: #FF9999; border: 1px solid rgba(232,64,64,0.3); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<h1>⚙️ Admin Control Panel</h1>
<p class="sub">Shri Ram M&A Conquest – Finance Wordle</p>

<div class="stats-row">
  <div class="card stat"><div class="num" id="statPhase">—</div><div class="lbl">Phase</div></div>
  <div class="card stat"><div class="num" id="statRound">—</div><div class="lbl">Round</div></div>
  <div class="card stat"><div class="num" id="statTeams">0</div><div class="lbl">Teams</div></div>
  <div class="card stat"><div class="num" id="statSolved">0</div><div class="lbl">Solved</div></div>
</div>

<div class="grid">
  <!-- Controls -->
  <div>
    <div class="card">
      <h3>Controls</h3>
      <div class="form-group">
        <label>Admin Key</label>
        <input type="password" id="adminKey" placeholder="Enter admin key" value="conquest2025"/>
      </div>
      <div id="adminStatus"></div>
      <button class="btn btn-green" onclick="adminAction('start')">▶ Start Game</button>
      <button class="btn btn-yellow" onclick="adminAction('refresh')">↻ Refresh State</button>
      <button class="btn btn-outline" onclick="adminAction('next')">⏭ Force End Round</button>
      <button class="btn btn-red" onclick="adminAction('reset')">⚠ Reset Game</button>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Event Log</h3>
      <div class="log" id="eventLog"></div>
    </div>
  </div>

  <!-- Team Status -->
  <div class="card">
    <h3>Team Status</h3>
    <div id="teamStatus"><p style="color:var(--muted);font-size:13px;">Waiting for teams to join...</p></div>
    <br/>
    <h3>Leaderboard</h3>
    <table style="width:100%;border-collapse:collapse;font-size:13px;" id="adminLb">
      <thead>
        <tr style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;">
          <th style="padding:8px;text-align:left;">#</th>
          <th style="padding:8px;text-align:left;">Team</th>
          <th style="padding:8px;text-align:right;">Score</th>
          <th style="padding:8px;text-align:right;">Guesses</th>
          <th style="padding:8px;text-align:right;">Time</th>
        </tr>
      </thead>
      <tbody id="adminLbBody"></tbody>
    </table>
  </div>
</div>

<script>
// 🔧 REPLACE THIS URL with your actual Render backend URL after deploying
const BACKEND_URL = "https://YOUR-APP-NAME.onrender.com";
const socket = io(BACKEND_URL);
const key = () => document.getElementById("adminKey").value;

socket.on("connect", () => {
  log("Connected to server", "ok");
  setTimeout(() => adminAction("refresh"), 500);
});
socket.on("disconnect", () => log("Disconnected!", "err"));

socket.on("admin_ok", ({ message }) => showStatus(message, "ok"));
socket.on("admin_error", ({ message }) => showStatus(message, "err"));

socket.on("admin_state", (state) => {
  document.getElementById("statPhase").textContent = state.phase;
  document.getElementById("statRound").textContent = `${state.round}/3`;
  document.getElementById("statTeams").textContent = state.teams.length;
  document.getElementById("statSolved").textContent = state.teams.filter(t => t.solved).length;

  // Team status
  const ts = document.getElementById("teamStatus");
  if (state.teams.length === 0) {
    ts.innerHTML = '<p style="color:var(--muted);font-size:13px;">No teams yet.</p>';
  } else {
    ts.innerHTML = state.teams.map(t => {
      const status = t.solved ? "solved" : t.finished ? "failed" : state.phase === "playing" ? "playing" : "waiting";
      return `<div class="status-row">
        <div class="team-name">${esc(t.name)}</div>
        <div style="color:var(--muted);font-size:12px;">${t.guesses}g</div>
        <div style="color:var(--muted);font-size:12px;">${t.timeTaken != null ? t.timeTaken+"s" : "—"}</div>
        <div class="badge ${status}">${status}</div>
        <div style="font-weight:700;color:var(--accent);font-size:13px;">${t.totalScore}pts</div>
      </div>`;
    }).join("");
  }

  // Leaderboard
  const lb = state.leaderboard || [];
  document.getElementById("adminLbBody").innerHTML = lb.map((t, i) =>
    `<tr style="border-bottom:1px solid rgba(255,255,255,0.04)">
      <td style="padding:8px;color:var(--muted)">${i+1}</td>
      <td style="padding:8px;font-weight:600">${esc(t.name)}</td>
      <td style="padding:8px;text-align:right;font-weight:800;color:var(--accent)">${t.totalScore}</td>
      <td style="padding:8px;text-align:right;color:var(--muted)">${t.guesses || "—"}</td>
      <td style="padding:8px;text-align:right;color:var(--muted)">${t.timeTaken != null ? t.timeTaken+"s" : "—"}</td>
    </tr>`
  ).join("");
});

// Live event listeners
socket.on("team_joined", ({ name }) => log(`Team joined: ${name}`));
socket.on("team_left",   ({ name }) => log(`Team left: ${name}`, "err"));
socket.on("team_solved", ({ name, guesses, timeTaken }) => log(`✓ ${name} solved in ${guesses}g / ${timeTaken}s`, "ok"));
socket.on("team_failed", ({ name }) => log(`✗ ${name} ran out of guesses`, "err"));
socket.on("round_start", ({ round }) => { log(`Round ${round} started`, "ok"); adminAction("refresh"); });
socket.on("round_end",   ({ round }) => { log(`Round ${round} ended`, "ok"); adminAction("refresh"); });
socket.on("game_over",   ()          => { log("Game over!", "ok"); adminAction("refresh"); });
socket.on("leaderboard_update", () => adminAction("refresh"));

function adminAction(action) {
  const k = key();
  if (action === "start")   socket.emit("admin_start",      { key: k });
  if (action === "next")    socket.emit("admin_next_round", { key: k });
  if (action === "reset")   { if (confirm("Reset entire game?")) socket.emit("admin_reset", { key: k }); }
  if (action === "refresh") socket.emit("admin_get_state",  { key: k });
}

function showStatus(msg, type) {
  const el = document.getElementById("adminStatus");
  el.textContent = msg;
  el.className = type;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
  log(msg, type);
}

function log(msg, type = "") {
  const container = document.getElementById("eventLog");
  const item = document.createElement("div");
  item.className = `log-item ${type}`;
  const time = new Date().toLocaleTimeString();
  item.innerHTML = `<span>${time}</span> ${esc(msg)}`;
  container.insertBefore(item, container.firstChild);
  while (container.children.length > 50) container.removeChild(container.lastChild);
}

function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Auto-refresh every 5s
setInterval(() => adminAction("refresh"), 5000);
</script>
</body>
</html>
